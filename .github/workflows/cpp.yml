name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up MSVC
      uses: microsoft/setup-msbuild@v1.0.2
      
    - name: Build
      run: g++ main.cpp window.cpp -o main.exe
      
    - name: Test
      run: ctest -C Release

