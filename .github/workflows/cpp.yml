name: C/C++ CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up CMake
      uses: cmake/setup-cmake@v1.5.5
      with:
        cmake-version: '3.21.3'
        
    - name: Build
      run: |
        mkdir build && cd build
        cmake ..
        cmake --build .
        
    # - name: Test
    #   run: ctest -C Release
